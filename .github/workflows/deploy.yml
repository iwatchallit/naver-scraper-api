name: Deploy to Tencent Cloud

on:
  push:
    branches:
      - master
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Copy files to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          password: ${{ secrets.VPS_PASSWORD }}
          source: "."
          target: "~/mrscrapper"
          rm: true
          # Exclude heavy folders, secrets, and git history
          exclude: ".git,node_modules,dist,artifacts/.scratch,artifacts/naver-auth/storage-state.json,.env"

      - name: Execute deployment commands
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          password: ${{ secrets.VPS_PASSWORD }}
          script: |
            # 1. Install Docker and Docker Compose if not installed
            if ! command -v docker &> /dev/null; then
              echo "Docker not found. Installing Docker..."
              curl -fsSL https://get.docker.com -o get-docker.sh
              sudo sh get-docker.sh
              sudo usermod -aG docker $USER
              rm get-docker.sh
            fi

            # 2. Go to the project directory
            cd ~/mrscrapper

            # 3. Create .env file if it doesn't exist
            # Note: We rely on the .env file being set up manually on the server once,
            # or we can copy .env.example if missing.
            if [ ! -f .env ]; then
              echo ".env not found, copying .env.example..."
              cp .env.example .env
            fi

            # 4. Spin up the containers
            sudo docker compose down
            sudo docker compose up -d --build
            
            # 5. Clean up unused images to save disk space
            sudo docker image prune -f
